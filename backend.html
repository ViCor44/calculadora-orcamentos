<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração Global do Sistema</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 40px 20px;
        }
        .admin-card { 
            background: #ffffff; 
            width: 100%; 
            max-width: 650px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); 
            padding: 35px; 
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        h2 { color: #1a202c; font-size: 24px; font-weight: 700; margin-bottom: 6px; text-align: center; }
        .subtitulo { color: #718096; font-size: 14px; text-align: center; margin-bottom: 25px; }
        h3 { color: #2d3748; font-size: 18px; font-weight: 600; margin: 25px 0 12px 0; border-bottom: 2px solid #edf2f7; padding-bottom: 8px; }
        .zona-ficheiros { display: flex; gap: 12px; margin: 20px 0; padding: 15px; background: #f7fafc; border-radius: 10px; border: 1px dashed #cbd5e0; }
        .btn-ficheiro { width: 50%; padding: 10px; background: #e2e8f0; color: #4a5568; font-size: 13px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s ease; }
        .btn-ficheiro:hover { background: #cbd5e0; color: #2d3748; }
        #inputImportar { display: none; }
        ul { list-style: none; max-height: 250px; overflow-y: auto; padding-right: 5px; }
        ul::-webkit-scrollbar { width: 6px; }
        ul::-webkit-scrollbar-thumb { background-color: #cbd5e0; border-radius: 4px; }
        li { background: #f8fafc; padding: 12px 16px; margin-bottom: 8px; border: 1px solid #edf2f7; border-left: 4px solid #3182ce; display: flex; justify-content: space-between; align-items: center; border-radius: 6px; }
        .item-info { font-size: 13.5px; color: #4a5568; line-height: 1.4; }
        .item-info strong { color: #1a202c; }
        .badge { background: #e2e8f0; color: #4a5568; font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-right: 4px; }
        .acoes { display: flex; gap: 6px; }
        .btn-editar { background: #feebc8; color: #c05621; padding: 6px 12px; font-size: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-editar:hover { background: #fbd38d; }
        .link-retorno { display: block; text-align: center; margin-top: 25px; color: #3182ce; font-weight: 600; font-size: 14px; text-decoration: none; transition: color 0.2s; }
        .link-retorno:hover { color: #2b6cb0; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="admin-card">
        <h2>Gestão de Tabelas e Preços</h2>
        <div class="subtitulo">Configure as margens e faça a gestão do catálogo</div>
        
        <div class="zona-ficheiros">
            <button class="btn-ficheiro" onclick="exportarJSON()">💾 Guardar Backup (.json)</button>
            <button class="btn-ficheiro" onclick="document.getElementById('inputImportar').click()">📂 Importar Ficheiro</button>
            <input type="file" id="inputImportar" accept=".json" onchange="importarJSON(this)">
        </div>

        <h3>Catálogo de Itens Ativos</h3>
        <ul id="listaProdutos"></ul>
        
        <a href="index.html" class="link-retorno">&larr; Voltar para a Calculadora Principal</a>
    </div>

    <script src="calculadora.js"></script>
</body>
</html>
