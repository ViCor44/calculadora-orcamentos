<!DOCTYPE html>
<html lang="pt"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Configuração do Sistema</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}body{background:linear-gradient(135deg,#f5f7fa 0%,#c3cfe2 100%);min-height:100vh;padding:30px 16px}.admin-card{background:#fff;width:100%;max-width:980px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08);padding:30px;margin:auto}h2{text-align:center;color:#1a202c;margin-bottom:6px}.subtitulo{text-align:center;color:#718096;margin-bottom:22px}h3{color:#2d3748;font-size:18px;margin:24px 0 12px;border-bottom:2px solid #edf2f7;padding-bottom:8px}.form-add,.box{background:#f7fafc;padding:18px;border-radius:10px;border:1px solid #e2e8f0;margin-bottom:16px}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}.campo{margin-bottom:12px}label{display:block;color:#4a5568;font-size:13px;font-weight:600;margin-bottom:4px}input,select,textarea{width:100%;padding:10px 12px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;background:#fff}.btn{padding:11px 14px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;background:#3182ce;color:#fff}.btn.success{background:#28a745}.btn.gray{background:#4a5568}.btn.danger{background:#dc3545}.zona-ficheiros{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}.lista{list-style:none;max-height:420px;overflow:auto}li{background:#f8fafc;padding:12px 14px;margin-bottom:8px;border:1px solid #edf2f7;border-left:4px solid #3182ce;display:flex;justify-content:space-between;gap:12px;align-items:center;border-radius:6px}.badge{background:#e2e8f0;color:#4a5568;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:700;margin-right:4px}.acoes{display:flex;gap:6px;flex-wrap:wrap}.btn-acao{padding:5px 9px;border:none;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer}.edit{background:#feebc8;color:#9c4221}.dup{background:#e9d8fd;color:#553c9a}.del{background:#fed7d7;color:#9b2c2c}.link-retorno{display:block;text-align:center;margin-top:22px;color:#3182ce;font-weight:700;text-decoration:none}.estado{padding:10px 12px;border-radius:8px;background:#ebf8ff;color:#2b6cb0;border:1px solid #bee3f8;font-size:13px;font-weight:600;margin-bottom:14px}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:5;justify-content:center;align-items:center}.modal.active{display:flex}.modal-content{background:#fff;padding:25px;border-radius:16px;max-width:560px;width:92%;max-height:88vh;overflow:auto}.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.close{background:none;border:none;font-size:28px;cursor:pointer}@media(max-width:760px){.grid-2,.grid-3{grid-template-columns:1fr}li{display:block}.acoes{margin-top:10px}}</style></head><body><div class="admin-card"><h2>Gestão de Tabelas e Preços</h2><div class="subtitulo">Catálogo, dados da empresa, PDF e QR Code</div><div id="estadoApp" class="estado">A carregar...</div>
<h3>🏢 Dados da empresa e orçamento</h3><div class="box"><div class="grid-2"><div class="campo"><label>Nome da empresa</label><input id="cfgEmpresaNome" placeholder="Nome comercial"></div><div class="campo"><label>NIF</label><input id="cfgEmpresaNif"></div></div><div class="grid-2"><div class="campo"><label>Email</label><input id="cfgEmpresaEmail"></div><div class="campo"><label>Telefone</label><input id="cfgEmpresaTelefone"></div></div><div class="campo"><label>Morada</label><input id="cfgEmpresaMorada"></div><div class="grid-3"><div class="campo"><label>Validade do orçamento (dias)</label><input type="number" id="cfgValidadeDias" min="1"></div><div class="campo"><label>MB WAY</label><input id="cfgMbway" placeholder="Telemóvel"></div><div class="campo"><label>IBAN</label><input id="cfgIban" placeholder="PT50..."></div></div><div class="campo"><label>Logótipo</label><input type="file" id="cfgLogo" accept="image/*"><small>Fica guardado neste navegador.</small></div><button class="btn success" onclick="guardarConfiguracaoEmpresa()">💾 Guardar dados da empresa</button></div>
<h3>➕ Adicionar novo item</h3><div class="form-add"><div class="grid-3"><div class="campo"><label>Categoria</label><input id="novoCategoria" placeholder="Ex: Impressão"></div><div class="campo"><label>Nome</label><input id="novoNome" placeholder="Ex: Cartaz A3"></div><div class="campo"><label>Tipo de cálculo</label><select id="novoTipo"><option value="quantidade">Quantidade</option><option value="area">Área</option><option value="area_com_extras">Área com extras</option><option value="horas_fotografia">Horas fotografia</option><option value="tempo_design">Tempo design</option><option value="pvc_tabela">PVC tabela</option><option value="quantidade_degrau">Quantidade escalonada</option></select></div></div><div class="grid-2"><div class="campo"><label>Preço base (€)</label><input type="number" id="novoPreco" step="0.01"></div><div class="campo"><label>Margem (%)</label><input type="number" id="novaMargem" step="0.1" value="0"></div></div><button class="btn success" onclick="adicionarItem()">➕ Adicionar</button></div>
<div class="zona-ficheiros"><button class="btn gray" onclick="exportarJSON()">💾 Guardar backup JSON</button><button class="btn gray" onclick="document.getElementById('inputImportar').click()">📂 Importar JSON</button><button class="btn gray" onclick="sincronizarGoogleSheets()">🔄 Recarregar Google Sheets</button><button class="btn danger" onclick="limparCatalogoLocal()">🧹 Limpar catálogo local</button><button class="btn" onclick="abrirGoogleSheets()">📊 Abrir Google Sheets</button><input type="file" id="inputImportar" accept=".json" style="display:none" onchange="importarJSON(this)"></div>
<h3>📋 Catálogo de itens ativos</h3><ul id="listaProdutos" class="lista"></ul><a href="index.html" class="link-retorno">← Voltar à calculadora</a></div>
<div id="modalEdicao" class="modal"><div class="modal-content"><div class="modal-head"><h3>✏️ Editar item</h3><button class="close" onclick="fecharModal()">×</button></div><input type="hidden" id="editId"><div class="campo"><label>Categoria</label><input id="editCategoria"></div><div class="campo"><label>Nome</label><input id="editNome"></div><div class="campo"><label>Tipo</label><select id="editTipo"><option value="quantidade">Quantidade</option><option value="area">Área</option><option value="area_com_extras">Área com extras</option><option value="horas_fotografia">Horas fotografia</option><option value="tempo_design">Tempo design</option><option value="pvc_tabela">PVC tabela</option><option value="quantidade_degrau">Quantidade escalonada</option></select></div><div class="grid-2"><div class="campo"><label>Preço base</label><input type="number" id="editPreco" step="0.01"></div><div class="campo"><label>Margem (%)</label><input type="number" id="editMargem" step="0.1"></div></div><button class="btn" onclick="salvarEdicao()">💾 Salvar alterações</button> <button class="btn gray" onclick="fecharModal()">Cancelar</button></div></div><script src="calculadora.js"></script></body></html>
